<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Mawared ERP social preview</title>
  <desc id="desc">Arabic-first HR and enterprise operations platform</desc>
  <defs>
