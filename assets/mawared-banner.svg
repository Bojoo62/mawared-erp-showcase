<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Mawared ERP showcase banner</title>
  <desc id="desc">Mawared ERP, an Arabic-first HR and enterprise operations platform</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081B33"/>
      <stop offset="0.55" stop-color="#0B3B52"/>
      <stop offset="1" stop-color="#0E7C7B"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#53E0C1"/>
      <stop offset="1" stop-color="#D7FFF7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#00101D" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="1080" cy="40" r="170" fill="#FFFFFF" opacity="0.04"/>
  <circle cx="1120" cy="330" r="230" fill="#53E0C1" opacity="0.05"/>
  <path d="M0 286 C240 222 390 350 640 286 C870 228 990 250 1200 188 L1200 360 L0 360 Z" fill="#FFFFFF" opacity="0.035"/>

  <g transform="translate(86 78)" filter="url(#shadow)">
    <rect width="204" height="204" rx="52" fill="#FFFFFF" opacity="0.10"/>
    <path d="M43 147V57h32l27 42 27-42h32v90h-31V101l-28 41-28-41v46z" fill="url(#mark)"/>
  </g>

  <g fill="#FFFFFF">
    <text x="340" y="132" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="60" font-weight="750" letter-spacing="1">Mawared ERP</text>
    <text x="340" y="192" font-family="Tahoma,Arial,sans-serif" font-size="40" font-weight="700" direction="rtl" unicode-bidi="bidi-override">موارد</text>
    <text x="340" y="246" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" opacity="0.82">Arabic-first HR &amp; enterprise operations platform</text>
    <text x="340" y="288" font-family="Tahoma,Arial,sans-serif" font-size="22" opacity="0.74" direction="rtl" unicode-bidi="bidi-override">منصة عربية لإدارة الموارد البشرية وعمليات الشركات</text>
  </g>

  <g transform="translate(982 255)">
    <rect width="132" height="42" rx="21" fill="#FFFFFF" opacity="0.12"/>
    <text x="66" y="27" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="650" fill="#D7FFF7">SHOWCASE</text>
  </g>
</svg>
